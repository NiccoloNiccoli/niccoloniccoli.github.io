<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include seo.html %}
    <link rel="shortcut icon" href="{{ '/Images/favicon.ico' | relative_url }}" type="image/x-icon">
    <link rel="icon" href="{{ '/Images/favicon.ico' | relative_url }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ '/CSS/stylesheet.css' | relative_url }}">
</head>
<body>
    <header class="site-header">
        <nav class="nav-shell" aria-label="Primary navigation">
            <a class="brand" href="{{ '/' | relative_url }}">{{ site.data.profile.name }}</a>
            <div class="nav-links">
                <a{% if page.nav == 'top' %} class="active"{% endif %} href="{{ '/' | relative_url }}">Top</a>
                <a{% if page.nav == 'publications' %} class="active"{% endif %} href="{{ '/publications.html' | relative_url }}">Publications</a>
            </div>
        </nav>
    </header>

    <main class="page-shell">
        {{ content }}

        <footer class="page-footer">
            Last updated: {{ site.time | date: "%B %Y" }}
        </footer>
    </main>
</body>
</html>
